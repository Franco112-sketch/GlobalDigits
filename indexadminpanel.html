<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GlobalDigits Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Syne:wght@700;800;900&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060b18;--bg2:#0c1424;--bg3:#111827;--bg4:#0a1120;
  --border:#131f35;--border2:#1e2d4a;
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  --blue:#2563eb;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--purple:#8b5cf6;
  --grad:linear-gradient(135deg,#2563eb,#0891b2);
  --shadow:0 2px 14px rgba(0,0,0,.4);--radius:11px;
}
[data-theme="light"]{
  --bg:#f1f5f9;--bg2:#ffffff;--bg3:#f8fafc;--bg4:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--muted:#64748b;--muted2:#475569;--shadow:0 2px 10px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;transition:background .2s,color .2s}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;background:var(--bg4);border:1px solid var(--border2);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;width:100%;box-sizing:border-box;outline:none;-webkit-appearance:none}
input::placeholder,textarea::placeholder{color:var(--muted)}
select option{background:var(--bg2)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── Shell ── */
#shell{display:flex;height:100vh;overflow:hidden}
#sidebar{width:216px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
#sidebar.slim{width:58px}
#main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;gap:10px}
#page-area{flex:1;overflow-y:auto;padding:clamp(14px,3vw,26px)}

/* ── Sidebar ── */
.sb-head{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
#sidebar.slim .sb-head{justify-content:center;padding:16px 0}
.sb-logo{width:30px;height:30px;background:var(--grad);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:13px;flex-shrink:0}
.sb-text{overflow:hidden;transition:opacity .2s}
#sidebar.slim .sb-text{display:none}
.sb-brand{color:var(--text);font-weight:800;font-size:13px}
.sb-tag{color:var(--blue);font-size:9px;font-weight:700;letter-spacing:1px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.nv{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px;border-left:3px solid transparent;color:var(--muted);font-size:12px;font-weight:600;transition:.15s;position:relative}
#sidebar.slim .nv{justify-content:center;padding:10px 0}
.nv:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nv.active{color:#fff;background:rgba(37,99,235,.15);border-left-color:var(--blue)}
.nv-icon{flex-shrink:0;display:flex;align-items:center}
.nv-badge{background:var(--red);color:#fff;border-radius:9px;font-size:9px;font-weight:800;padding:1px 5px;margin-left:auto}
#sidebar.slim .nv-badge{position:absolute;top:6px;right:6px;margin-left:0}
.sb-foot{padding:12px;border-top:1px solid var(--border)}
.collapse-btn{color:var(--muted);font-size:12px;width:100%;display:flex;align-items:center;gap:6px;justify-content:center}

/* ── Topbar ── */
.tb-l{display:flex;align-items:center;gap:10px}
.tb-section{color:var(--text);font-weight:700;font-size:14px;text-transform:capitalize}
.tb-r{display:flex;align-items:center;gap:8px}
.tb-clock{color:var(--muted);font-size:11px;font-family:monospace}
.tb-avatar{width:26px;height:26px;background:var(--grad);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;flex-shrink:0}
.btn-logout{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red);padding:5px 10px;border-radius:7px;font-size:11px;font-weight:700}
.mob-toggle{display:none;flex-direction:column;gap:4px;padding:4px;align-items:center;justify-content:center}
.mob-toggle span{display:block;width:17px;height:2px;background:var(--muted);border-radius:2px}
.icon-btn{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted2);border:1px solid var(--border2);background:none;flex-shrink:0;transition:.15s}
.icon-btn:hover{color:var(--text);border-color:var(--blue)}

/* ── Loading bar ── */
#lbar{height:2px;background:var(--grad);display:none;flex-shrink:0}

/* ── Toast ── */
#toaster{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:7px;pointer-events:none;width:min(360px,calc(100vw - 24px))}
.tst{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;color:#fff;animation:tup .25s ease}
.tst-s{background:#10b981}.tst-e{background:#ef4444}.tst-w{background:#f59e0b}
@keyframes tup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Modal ── */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px}
.mbox{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;animation:tup .2s ease}
.mbox-lg{max-width:680px}
.mhead{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}
.mhead h3{color:var(--text);font-weight:800;margin:0;font-size:14px}
.mclose{color:var(--muted);font-size:20px;line-height:1;padding:0 4px}
.mbody{padding:17px}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:15px;box-shadow:var(--shadow)}

/* ── Auth ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--bg)}
.auth-box{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:clamp(20px,4vw,30px);width:100%;max-width:400px;box-shadow:var(--shadow)}
.auth-logo{width:44px;height:44px;background:var(--grad);border-radius:11px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:19px;margin:0 auto 12px}
.auth-title{font-family:'Syne',sans-serif;color:var(--text);font-weight:800;font-size:18px;text-align:center;margin-bottom:4px}
.auth-sub{color:var(--muted);font-size:12px;text-align:center;margin-bottom:20px}
.auth-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red);padding:9px 12px;border-radius:8px;margin-bottom:12px;font-size:12px;display:none}
.auth-sw{text-align:center;color:var(--muted);font-size:12px;margin-top:12px}
.auth-sw button{color:#60a5fa;font-weight:600;font-size:12px}

/* ── Forms ── */
.fg{margin-bottom:12px}
.fl{color:var(--muted);font-size:10px;font-weight:700;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Btns ── */
.btn{border-radius:7px;font-weight:700;font-size:12px;padding:6px 12px;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn:hover{opacity:.82}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--grad);color:#fff}
.btn-full{width:100%;justify-content:center;margin-top:7px;padding:11px}
.btn-green{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#10b981}
.btn-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.btn-yellow{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--yellow)}
.btn-ghost{background:rgba(255,255,255,.04);border:1px solid var(--border2);color:var(--muted2)}
.btn-purple{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);color:#a78bfa}
.btn-sm{padding:4px 9px;font-size:11px}

/* ── Badges ── */
.bdg{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;white-space:nowrap;display:inline-block}
.bdg-y{background:rgba(245,158,11,.12);color:#f59e0b}
.bdg-b{background:rgba(59,130,246,.12);color:#3b82f6}
.bdg-g{background:rgba(16,185,129,.12);color:#10b981}
.bdg-p{background:rgba(139,92,246,.12);color:#8b5cf6}
.bdg-r{background:rgba(239,68,68,.12);color:#ef4444}

/* ── Alert ── */
.alert{padding:10px 13px;border-radius:8px;font-size:12px;line-height:1.5;margin-bottom:12px}
.alert-b{background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2);color:#93c5fd}
.alert-y{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#fbbf24}
.alert-r{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.alert-g{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#6ee7b7}

/* ── Stats ── */
.stcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.stlabel{color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.stval{font-family:'Syne',sans-serif;font-weight:900;font-size:19px}

/* ── Data rows ── */
.drow{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);transition:border-color .15s}
.drow:hover{border-color:var(--blue)}

/* ── Filter bar ── */
.fbar{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-ms-overflow-style:none;scrollbar-width:none}
.fbar::-webkit-scrollbar{display:none}
.fbtn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;border:1px solid var(--border2);color:var(--muted);background:none}
.fbtn.active{background:rgba(37,99,235,.2);border-color:var(--blue);color:#60a5fa}

/* ── Responsive ── */
@media(max-width:768px){
  #sidebar{display:none}
  #sidebar.mob-open{display:flex;position:fixed;inset:0;z-index:300;width:100%!important}
  .mob-toggle{display:flex!important}
  .tb-clock,.tb-uname{display:none}
  .form-row{grid-template-columns:1fr}
}
@media(max-width:480px){
  #page-area{padding:12px 10px}
  .stcard{padding:12px 10px}
}

/* ═══ ADMIN OVERVIEW v2 ═══ */
.adm-ov{}
.adm-ov-title{margin-bottom:16px}
.adm-kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.adm-kpi{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;transition:border-color .15s}
.adm-kpi:hover{border-color:rgba(59,130,246,.3)}
.adm-kpi-icon{margin-bottom:8px;opacity:.8}
.adm-kpi-val{font-family:'Syne',sans-serif;font-weight:900;font-size:20px;margin-bottom:2px}
.adm-kpi-label{color:var(--text);font-size:12px;font-weight:700;margin-bottom:2px}
.adm-kpi-sub{color:var(--muted);font-size:11px}
</style>
</head>
<body>
<div id="shell">
  <div id="toaster"></div>
</div>

<script>// ══════════════════════════════════════════════════════════════
// ADMIN — VPN Package Management
// ══════════════════════════════════════════════════════════════
function secVPN() {
  var pkgs   = A.vpnPackages||[];
  var orders = (A.vpnOrders||[]);
  var h = '<div>';
  // Header
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px">';
  h += '<div><div style="font-family:Syne,sans-serif;color:var(--text);font-size:clamp(16px,3vw,20px);font-weight:800">VPN Management</div>';
  h += '<div style="color:var(--muted);font-size:12px">'+pkgs.length+' packages &bull; '+orders.length+' orders</div></div>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
  h += '<button class="btn btn-primary btn-sm" onclick="openVPNModal(null)">+ Add Package</button>';
  h += '<button class="btn btn-ghost btn-sm" onclick="reload()">Refresh</button>';
  h += '</div></div>';

  // Stats
  var revenue  = orders.reduce(function(s,o){return s+(o.amount||0);},0);
  var pending  = orders.filter(function(o){return o.status==='paid-pending-delivery';}).length;
  var delivered= orders.filter(function(o){return o.status==='delivered';}).length;
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px">';
  [{l:'Packages',v:pkgs.length,c:'var(--blue)'},{l:'Pending',v:pending,c:'var(--yellow)'},{l:'Delivered',v:delivered,c:'var(--green)'},{l:'Revenue',v:fmt(revenue),c:'var(--purple)'}].forEach(function(s){
    h += '<div class="stcard"><div class="stlabel">'+s.l+'</div><div class="stval" style="color:'+s.c+'">'+s.v+'</div></div>';
  });
  h += '</div>';

  // Packages section
  h += '<div style="color:var(--text);font-weight:700;font-size:14px;margin-bottom:12px">VPN Packages</div>';
  if(!pkgs.length) {
    h += '<div class="drow" style="text-align:center;color:var(--muted);padding:30px">No packages yet. Add your first VPN package.</div>';
  } else {
    pkgs.forEach(function(v){
      h += '<div class="drow"><div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">';
      h += '<div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#7C3AED,#3b82f6);display:flex;align-items:center;justify-content:center;flex-shrink:0">';
      h += '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>';
      h += '<div style="flex:1;min-width:140px">';
      h += '<div style="color:var(--text);font-weight:700;font-size:13px">'+esc(v.name)+'</div>';
      if(v.duration) h += '<div style="color:var(--muted);font-size:11px">'+esc(v.duration)+'</div>';
      if(v.description) h += '<div style="color:var(--muted2);font-size:11px;margin-top:2px">'+esc(v.description.slice(0,60))+(v.description.length>60?'...':'')+'</div>';
      h += '</div>';
      h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0">';
      h += '<span style="color:var(--green);font-weight:800;font-size:14px">'+fmt(v.price)+'</span>';
      h += '<span style="font-size:11px;font-weight:600;color:'+(v.status==='active'?'var(--green)':'var(--muted)')+'">'+(v.status==='active'?'Active':'Inactive')+'</span>';
      if(v.popular) h += '<span class="bdg bdg-p">Popular</span>';
      h += '<button class="btn btn-ghost btn-sm" onclick="openVPNModal('+v.id+')">Edit</button>';
      h += '<button class="btn btn-red btn-sm" onclick="deleteVPN('+v.id+')">Delete</button>';
      h += '</div></div></div>';
    });
  }

  // Orders section
  h += '<div style="color:var(--text);font-weight:700;font-size:14px;margin-top:24px;margin-bottom:12px">VPN Orders</div>';
  if(!orders.length) {
    h += '<div class="drow" style="text-align:center;color:var(--muted);padding:30px">No VPN orders yet.</div>';
  } else {
    var sColors = {'paid-pending-delivery':'var(--yellow)','delivered':'var(--green)','cancelled':'var(--red)'};
    var sLabels = {'paid-pending-delivery':'Paid - Pending','delivered':'Delivered','cancelled':'Cancelled'};
    orders.slice(0,50).forEach(function(o){
      var sc = sColors[o.status]||'var(--muted)';
      var sl = sLabels[o.status]||o.status;
      h += '<div class="drow"><div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap">';
      h += '<div style="flex:1;min-width:160px">';
      h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px">';
      h += '<span style="color:var(--text);font-weight:700;font-size:13px">'+esc(o.user_name||'')+'</span>';
      h += '<span style="font-family:monospace;color:var(--blue);font-size:10px">'+esc(o.id||'')+'</span>';
      h += '<span style="background:'+sc+'18;border:1px solid '+sc+'40;color:'+sc+';padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700">'+sl+'</span>';
      h += '</div>';
      h += '<div style="color:var(--muted);font-size:11px">'+esc(o.user_email||'')+'</div>';
      h += '<div style="color:var(--muted2);font-size:12px;margin-top:3px">Package: <strong>'+esc(o.vpn_name||'')+'</strong></div>';
      if(o.paystack_ref) h += '<div style="color:var(--muted);font-size:10px;font-family:monospace;margin-top:2px">Ref: '+esc(o.paystack_ref)+'</div>';
      if(o.delivery_details) h += '<div style="background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:7px;padding:7px 10px;margin-top:6px;font-size:12px;color:var(--text)">Delivered: '+esc(o.delivery_details.slice(0,100))+'</div>';
      h += '</div>';
      h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">';
      h += '<span style="color:var(--green);font-weight:900;font-size:15px">'+fmt(o.amount||0)+'</span>';
      h += '<span style="color:var(--muted);font-size:11px">'+ago(o.created_at)+'</span>';
      h += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
      if(o.status==='paid-pending-delivery'){
        h += '<button class="btn btn-primary btn-sm" onclick="deliverVPNOrder(\''+esc(o.id)+'\')">Deliver</button>';
        h += '<button class="btn btn-red btn-sm" onclick="setVPNOrderStatus(\''+esc(o.id)+'\',\'cancelled\')">Cancel</button>';
      } else if(o.status==='delivered'){
        h += '<span style="color:var(--green);font-size:11px;font-weight:700">&#10003; Delivered</span>';
      }
      h += '</div></div>';
      h += '</div></div>';
    });
  }
  h += '</div>';
  return h;
}

function openVPNModal(id) {
  var v = id ? (A.vpnPackages||[]).find(function(x){return x.id===id;}) : null;
  showModal(
    '<div class="mhead"><h3>'+(v?'Edit: '+esc(v.name):'Add VPN Package')+'</h3><button class="mclose" onclick="closeModal()">X</button></div>'+
    '<div class="mbody">'+
    '<div class="fg"><label class="fl">Package Name *</label><input id="vp-name" placeholder="e.g. VPN Basic Monthly" value="'+esc(v?v.name:'')+'"/></div>'+
    '<div class="fg"><label class="fl">Price (NGN) *</label><input id="vp-price" type="number" min="0" value="'+(v?v.price:'')+'"/></div>'+
    '<div class="fg"><label class="fl">Duration</label><input id="vp-dur" placeholder="e.g. 1 Month, 3 Months, Lifetime" value="'+esc(v&&v.duration?v.duration:'')+'"/></div>'+
    '<div class="fg"><label class="fl">Description</label><textarea id="vp-desc" rows="3" placeholder="What does this package include?">'+esc(v?v.description||'':'')+'</textarea></div>'+
    '<div class="fg"><label class="fl">Status</label><select id="vp-status">'+
      '<option value="active"'+((!v||v.status==='active')?' selected':'')+'>Active (visible to users)</option>'+
      '<option value="inactive"'+((v&&v.status==='inactive')?' selected':'')+'>Inactive (hidden)</option>'+
    '</select></div>'+
    '<div class="fg"><label class="fl">Mark as Popular</label><select id="vp-pop">'+
      '<option value="false"'+((!v||!v.popular)?' selected':'')+'>No</option>'+
      '<option value="true"'+((v&&v.popular)?' selected':'')+'>Yes &mdash; Show Popular badge</option>'+
    '</select></div>'+
    '<div style="display:flex;gap:8px">'+
      '<button class="btn btn-primary" onclick="saveVPN('+(id||'null')+')">'+(v?'Save Changes':'Add Package')+'</button>'+
      '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'+
    '</div></div>'
  , true);
}

async function saveVPN(id) {
  var name  = ((document.getElementById('vp-name')||{}).value||'').trim();
  var price = ((document.getElementById('vp-price')||{}).value||'').trim();
  var dur   = ((document.getElementById('vp-dur')||{}).value||'').trim();
  var desc  = ((document.getElementById('vp-desc')||{}).value||'').trim();
  var stat  = ((document.getElementById('vp-status')||{}).value||'active');
  var pop   = ((document.getElementById('vp-pop')||{}).value||'false') === 'true';
  if(!name) { toast('Package name is required','w'); return; }

// ═══════════════════════════════════════════════════════
// ADMIN — REDEEM CODES SECTION
// ═══════════════════════════════════════════════════════
function secRedeem() {
  var codes  = A.redeemCodes  || [];
  var uses   = A.redeemUses   || [];
  var filter = A.filter.redeem || 'all';
  var q      = (A.search.redeem || '').toLowerCase();

  var filtered = codes.filter(function(c){
    var ms = filter === 'all' || c.status === filter;
    var mq = !q || (c.code||'').toLowerCase().includes(q) ||
                   (c.title||'').toLowerCase().includes(q);
    return ms && mq;
  });

  var active   = codes.filter(function(c){ return c.status === 'active'; }).length;
  var depleted = codes.filter(function(c){ return c.status === 'depleted'; }).length;
  var totalUses= codes.reduce(function(s,c){ return s+(c.redemption_count||0); }, 0);

  var h = '<div>';

  // Header
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px">';
  h += '<div><div style="font-family:Syne,sans-serif;color:var(--text);font-size:clamp(16px,3vw,20px);font-weight:800">Redeem Codes</div>';
  h += '<div style="color:var(--muted);font-size:12px">'+codes.length+' total codes &bull; '+totalUses+' redemptions</div></div>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
  h += '<input id="redeem-search" placeholder="Search codes..." value="'+esc(q)+'" style="width:150px"/>';
  h += '<button class="btn btn-primary btn-sm" onclick="openRedeemModal(null)">+ New Code</button>';
  h += '<button class="btn btn-ghost btn-sm" onclick="reload()">Refresh</button>';
  h += '</div></div>';

  // Stats
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px">';
  [{l:'Total',v:codes.length,c:'var(--blue)'},{l:'Active',v:active,c:'var(--green)'},{l:'Depleted',v:depleted,c:'var(--red)'},{l:'Total Uses',v:totalUses,c:'var(--purple)'}].forEach(function(s){
    h += '<div class="stcard"><div class="stlabel">'+s.l+'</div><div class="stval" style="color:'+s.c+'">'+s.v+'</div></div>';
  });
  h += '</div>';

  // Filter tabs
  h += '<div class="fbar" style="margin-bottom:16px">';
  [{id:'all',lbl:'All ('+codes.length+')'},{id:'active',lbl:'Active'},{id:'depleted',lbl:'Depleted'},{id:'inactive',lbl:'Inactive'}].forEach(function(t){
    h += '<button class="fbtn'+(filter===t.id?' active':'')+'" data-redeemf="'+t.id+'">'+t.lbl+'</button>';
  });
  h += '</div>';

  if(!filtered.length){
    h += '<div class="drow" style="text-align:center;color:var(--muted);padding:48px">No redeem codes found. Create your first one!</div>';
  } else {
    filtered.forEach(function(c){
      var used = c.redemption_count || 0;
      var max  = c.max_redemptions;
      var pct  = max ? Math.min(100, Math.round(used/max*100)) : null;
      var sc   = c.status==='active'?'var(--green)':c.status==='depleted'?'var(--red)':'var(--muted)';

      h += '<div class="drow">';
      h += '<div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap">';

      // Icon
      h += '<div style="width:44px;height:44px;border-radius:11px;background:var(--grad);display:flex;align-items:center;justify-content:center;flex-shrink:0">';
      h += '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/></svg>';
      h += '</div>';

      // Info
      h += '<div style="flex:1;min-width:160px">';
      h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">';
      h += '<span style="color:var(--text);font-weight:800;font-size:13px">'+esc(c.title||'Untitled')+'</span>';
      h += '<span style="background:'+sc+'18;border:1px solid '+sc+'40;color:'+sc+';padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:capitalize">'+esc(c.status||'active')+'</span>';
      h += '</div>';
      // Code
      h += '<div style="font-family:monospace;font-size:13px;font-weight:700;color:var(--blue);letter-spacing:1px;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 10px;display:inline-block;margin-bottom:6px;cursor:pointer" onclick="copyCode(\''+esc(c.code||'')+'\')">'+esc(c.code||'')+'<span style="color:var(--muted);font-size:10px;font-weight:400;margin-left:7px">&#x2398; copy</span></div>';
      // Reward preview
      h += '<div style="color:var(--muted2);font-size:11px;margin-bottom:5px">'+esc((c.reward_content||'').slice(0,60))+(c.reward_content&&c.reward_content.length>60?'…':'')+'</div>';
      // Usage bar
      h += '<div style="display:flex;align-items:center;gap:8px">';
      h += '<span style="color:var(--muted);font-size:11px">'+used+(max?' / '+max:' uses')+'</span>';
      if(pct !== null){
        h += '<div style="flex:1;height:5px;background:var(--bg3);border-radius:3px;max-width:120px">';
        h += '<div style="height:100%;background:'+(pct>=100?'var(--red)':'var(--green)')+';border-radius:3px;width:'+pct+'%"></div>';
        h += '</div>';
      }
      h += '<span style="color:var(--muted);font-size:11px">'+ago(c.created_at)+'</span>';
      h += '</div></div>';

      // Actions
      h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">';
      h += '<button class="btn btn-ghost btn-sm" onclick="openRedeemModal(\''+c.id+'\')">Edit</button>';
      h += '<button class="btn btn-ghost btn-sm" onclick="viewRedeemUses(\''+c.id+'\',\''+esc(c.title||c.code||'')+'\')">Uses ('+used+')</button>';
      if(c.status==='active'){
        h += '<button class="btn btn-red btn-sm" onclick="setRedeemStatus(\''+c.id+'\',\'inactive\')">Deactivate</button>';
      } else if(c.status==='inactive'){
        h += '<button class="btn btn-green btn-sm" onclick="setRedeemStatus(\''+c.id+'\',\'active\')">Activate</button>';
      }
      h += '<button class="btn btn-red btn-sm" onclick="deleteRedeemCode(\''+c.id+'\')">Delete</button>';
      h += '</div>';

      h += '</div></div>';
    });
  }
  h += '</div>';
  return h;
}

        '<button class="btn btn-ghost btn-sm" style="flex-shrink:0" onclick="document.getElementById(\'rc-code\').value=(\'GDR-\'+Date.now().toString(36).toUpperCase().slice(-4)+\'-\'+Math.random().toString(36).toUpperCase().slice(2,6))">Regenerate</button>'+

    '<div class="fg"><label class="fl">Max Redemptions <span style="color:var(--muted);font-weight:400">(leave blank = unlimited)</span></label><input id="rc-max" type="number" min="1" placeholder="e.g. 100" value="'+(c&&c.max_redemptions!=null?c.max_redemptions:'')+'"/></div>'+
    '<div class="fg"><label class="fl">Status</label><select id="rc-status">'+
      '<option value="active"'+(!c||c.status==='active'?' selected':'')+'>Active</option>'+

    '</select></div>'+
    '<div style="display:flex;gap:8px">'+

      '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'+
    '</div></div>'
  , true);
}

// ── Save ──
async function saveRedeemCode(id) {
  var title   = ((document.getElementById('rc-title')||{}).value||'').trim();
  var code    = ((document.getElementById('rc-code')||{}).value||'').trim().toUpperCase();
  var reward  = ((document.getElementById('rc-reward')||{}).value||'').trim();
  var maxV    = ((document.getElementById('rc-max')||{}).value||'').trim();
  var status  = ((document.getElementById('rc-status')||{}).value)||'active';
  if(!title)  { toast('Title is required','w'); return; }
  if(!code)   { toast('Code is required','w'); return; }
  if(!reward) { toast('Reward content is required','w'); return; }
  var body = {
    title: title,
    code:  code,
    reward_content: reward,
    max_redemptions: maxV ? Number(maxV) : null,
    status: status
  };
  showLoad(); closeModal();
  try {
    if(id && id !== 'null'){
      await dbPatch('redeem_codes','id=eq.'+id, body);
      toast('Code updated');
    } else {
      body.redemption_count = 0;
      body.created_at = new Date().toISOString();
      await dbPost('redeem_codes', body);
      toast('Redeem code created!');
    }
    await reloadRedeem();
  } catch(e) { toast('Error: '+e.message,'e'); hideLoad(); }
}

// ── Delete ──
async function deleteRedeemCode(id) {
  if(!confirm('Delete this redeem code? All redemption records will be lost.')) return;
  showLoad();
  try {
    await dbDel('redeem_uses','code_id=eq.'+id);
    await dbDel('redeem_codes','id=eq.'+id);
    await reloadRedeem();
    toast('Code deleted','w');
  } catch(e) { toast('Error: '+e.message,'e'); hideLoad(); }
}

        html += '<div style="background:var(--bg3);border-radius:7px;padding:7px 10px;margin-top:7px;font-size:12px;color:var(--text);border-left:3px solid var(--border2)">'+esc(b.notes)+'</div>';

      html += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">';
      html += '<div style="color:var(--green);font-weight:900;font-size:16px;font-family:Syne,sans-serif">'+fmt(b.amount||0)+'</div>';
      html += '<div style="color:var(--muted);font-size:11px">'+ago(b.created_at)+'</div>';

      // Action buttons
      html += '<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;margin-top:4px">';
      if(b.status === 'paid-pending-processing'){
        html += '<button class="btn btn-primary btn-sm" onclick="updateBoostStatus(\''+esc(b.id)+'\',\'processing\')">Start Processing</button>';
        html += '<button class="btn btn-red btn-sm" onclick="updateBoostStatus(\''+esc(b.id)+'\',\'cancelled\')">Cancel</button>';
      } else if(b.status === 'processing'){
        html += '<button class="btn btn-green btn-sm" onclick="updateBoostStatus(\''+esc(b.id)+'\',\'completed\')">Mark Complete</button>';
        html += '<button class="btn btn-red btn-sm" onclick="updateBoostStatus(\''+esc(b.id)+'\',\'cancelled\')">Cancel</button>';
      } else if(b.status === 'completed'){
        html += '<span style="color:var(--green);font-size:11px;font-weight:700">&#10003; Completed</span>';
      } else if(b.status === 'cancelled'){
        html += '<button class="btn btn-ghost btn-sm" onclick="updateBoostStatus(\''+esc(b.id)+'\',\'paid-pending-processing\')">Reopen</button>';
      }
      html += '</div></div>';
      html += '</div></div>';
    });
  }
  html += '</div>';
  return html;
}

function toggleCatInput(){

function handleProdImgUpload(input){
  var file = input.files && input.files[0];
  if(!file) return;
  if(file.size > 3 * 1024 * 1024){
    toast('Image too large. Please use an image under 3MB.','w');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e){
    var dataUrl = e.target.result;
    var area   = document.getElementById('pm-img-area');
    var hidden = document.getElementById('pm-img-data');
    if(area){
      area.innerHTML =
        '<img src="'+dataUrl+'" style="width:80px;height:80px;border-radius:10px;object-fit:cover;margin:0 auto 8px;display:block"/>'+
        '<div style="color:var(--green);font-size:12px;font-weight:600">'+file.name.slice(0,30)+'</div>'+
        '<div style="color:var(--muted);font-size:11px;margin-top:3px">Click to change</div>';
    }
    if(hidden) hidden.value = dataUrl;
  };
  reader.readAsDataURL(file);
}

async function saveProd(id){
  var name    = ((document.getElementById('pm-n')||{}).value||'').trim();
  var price   = ((document.getElementById('pm-p')||{}).value||'').trim();
  var catSel  = ((document.getElementById('pm-cat')||{}).value||'').trim();
  var catRaw  = ((document.getElementById('pm-cat-custom')||{}).value||'').trim();
  var catCust = catRaw.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  var category= catSel === '__custom__' ? catCust : catSel;
  var imgData  = ((document.getElementById('pm-img-data')||{}).value||'').trim();
  var emoji   = ((document.getElementById('pm-i')||{}).value||'').trim();
  var featVal = ((document.getElementById('pm-feat')||{}).value||'false');
  if(!name)     { toast('Product title is required','w'); return; }
  if(!price)    { toast('Price is required','w'); return; }
  if(!category) { toast('Category is required','w'); return; }
  var body = {
    name:        name,
    category:    category,
    platform:    ((document.getElementById('pm-pl')||{}).value||'').trim()||null,
    country:     ((document.getElementById('pm-c')||{}).value||'').trim()||null,
    price:       Number(price),
    stock:       Number(((document.getElementById('pm-s')||{}).value)||99),
    status:      ((document.getElementById('pm-st')||{}).value)||'available',
    image:       emoji||null,
    image_url:   imgData||null,
    description: ((document.getElementById('pm-d')||{}).value||'').trim()||null,
    featured:    featVal==='true'
  };
  showLoad(); closeModal();
  try{
    if(id){ await dbPatch('products','id=eq.'+id, body); toast('Product updated'); }
    else  { await dbPost('products', body); toast('Product added'); }
    await reload();
  }catch(e){ toast('Error: '+e.message,'e'); hideLoad(); }
}

async function reload(){
  if(!A.admin) return;
  // Don't reload if on numbers tab — it wipes balance and search results
  if(A.section==='numbers'||A.section==='notify') return;
  showLoad(); A.syncing=true;
  try {
    const [o,u,p,an,msgs,bst,vp,vo,rc,ru] = await Promise.all([
      dbGet('orders','order=created_at.desc'),
      dbGet('users','order=created_at.desc'),
      dbGet('products','order=id.asc'),
      dbGet('announcements','order=created_at.desc'),
      dbGet('messages','order=created_at.desc&limit=200'),
      dbGet('boost_requests','order=created_at.desc&limit=500').catch(function(){return [];}),
      dbGet('vpn_packages','order=id.asc').catch(function(){return [];}),
      dbGet('vpn_orders','order=created_at.desc&limit=200').catch(function(){return [];}),
      dbGet('redeem_codes','order=created_at.desc&limit=200').catch(function(){return [];}),
      dbGet('redeem_uses','order=created_at.desc&limit=500').catch(function(){return []; })
    ]);
    A.orders=o; A.users=u; A.products=p; A.anns=an; A.messages=msgs||[]; A.boosts=Array.isArray(bst)?bst:[]; A.vpnPackages=Array.isArray(vp)?vp:[]; A.vpnOrders=Array.isArray(vo)?vo:[]; A.redeemCodes=Array.isArray(rc)?rc:[]; A.redeemUses=Array.isArray(ru)?ru:[];
    try { A.appeals = await dbGet('appeals','order=submitted_at.desc&limit=100'); } catch(e) {
      try { const s=await dbGet('settings','key=eq.appeals'); A.appeals=s[0]?(s[0].value||[]):[]; } catch(e2){ A.appeals=[]; }
    }
  } catch(e){ toast('Sync error: '+e.message,'e'); }
  A.syncing=false; hideLoad(); renderSection();
}

  const shell=document.getElementById('shell');
  if(A.screen==='login'||A.screen==='register'){
    shell.innerHTML=(A.screen==='login'?authLogin():authRegister())+'<div id="toaster"></div>';
    bindAuth(); return;
  }
  shell.innerHTML=appShell()+'<div id="toaster"></div>';
  bindShell();
  renderSection();
  startClock();
  reload();
  setInterval(reload,9000);
}


function renderSection(){
  const el=document.getElementById('page-area');
  if(!el) return;
  const fns={overview:secOverview,orders:secOrders,products:secProducts,users:secUsers,announcements:secAnns,settings:secSettings,activity:secActivity,appeals:secAppeals,messages:secMessages,numbers:secNumbers,notify:secNotify,analytics:secAnalytics,boosts:secBoosts, vpn:secVPN, redeem:secRedeem};
  el.innerHTML=(fns[A.section]||secOverview)();
  bindSection();
  syncNav();
}

function syncNav(){
  document.querySelectorAll('[data-sec]').forEach(b=>b.classList.toggle('active',b.dataset.sec===A.section));
  const pending=A.orders.filter(o=>o.status==='payment-pending-approval').length;
  document.querySelectorAll('.ord-pending').forEach(b=>{b.textContent=pending;b.style.display=pending?'inline':'none';});
  const boostPending=(A.boosts||[]).filter(function(x){return x.status==='paid-pending-processing';}).length;
  document.querySelectorAll('.bst-pending').forEach(function(b){b.textContent=boostPending;b.style.display=boostPending?'inline':'none';});
  const appPending=(A.appeals||[]).filter(x=>x.status==='pending').length;
  document.querySelectorAll('.app-pending').forEach(b=>{b.textContent=appPending;b.style.display=appPending?'inline':'none';});
  const msgPending=(A.messages||[]).filter(x=>x.status==='open'&&!x.admin_reply).length;
  document.querySelectorAll('.msg-pending').forEach(b=>{b.textContent=msgPending;b.style.display=msgPending?'inline':'none';});
  const tb=document.getElementById('tb-section-name');
  if(tb) tb.textContent=A.section;
  const av=document.getElementById('tb-avatar');
  if(av&&A.admin) av.textContent=A.admin.name.charAt(0).toUpperCase();
  const un=document.getElementById('tb-uname');
  if(un&&A.admin) un.textContent=A.admin.name;
}

function setSection(s){
  A.section=s;

  if(s==='numbers' && isOwner()){

async function handleAuth(){
  const err=document.getElementById('auth-err');
  const btn=document.getElementById('auth-btn');
  if(err)err.style.display='none';
  if(btn){btn.disabled=true;}

  if(A.screen==='login'){
    const email=(document.getElementById('a-em')||{}).value||'';
    const pw=(document.getElementById('a-pw')||{}).value||'';
    if(!email||!pw){showErr(err,'Please fill all fields.');if(btn)btn.disabled=false;return;}
    if(btn)btn.textContent='Signing in…';
    try{
      const d=await dbGet('admin_accounts','email=ilike.'+encodeURIComponent(email.trim().toLowerCase())+'&select=*');
      if(!d.length){showErr(err,'No admin account with this email.');}
      else if(d[0].password!==pw.trim()){showErr(err,'Wrong password.');}
      else{A.admin=d[0];localStorage.setItem('gd_admin',JSON.stringify(d[0]));A.screen='app';render();toast('Welcome back, '+d[0].name+(isOwner()?' (Owner)':' (Support)')+'!');return;}
    }catch(e){showErr(err,'Connection error: '+e.message);}
    if(btn){btn.textContent='Sign In';btn.disabled=false;}

  }else{
    const name=(document.getElementById('a-nm')||{}).value||'';
    const email=(document.getElementById('a-em')||{}).value||'';
    const phone=(document.getElementById('a-ph')||{}).value||'';
    const pw=(document.getElementById('a-pw')||{}).value||'';
    const pw2=(document.getElementById('a-pw2')||{}).value||'';
    const key=(document.getElementById('a-key')||{}).value||'';
    const role=(document.getElementById('a-role')||{}).value||'support';
    if(!name||!email||!pw){showErr(err,'Fill all required fields.');if(btn)btn.disabled=false;return;}
    if(pw!==pw2){showErr(err,'Passwords do not match.');if(btn)btn.disabled=false;return;}
    if(pw.length<6){showErr(err,'Password too short.');if(btn)btn.disabled=false;return;}
    const validKey = role==='owner' ? key===OWNER_KEY : key===ADMIN_KEY;
    if(!validKey){showErr(err,role==='owner'?'Wrong owner key.':'Wrong support key. It is: GD-ADMIN-2025');if(btn)btn.disabled=false;return;}
    if(btn)btn.textContent='Creating…';
    try{
      const clean=email.trim().toLowerCase();
      const ex=await dbGet('admin_accounts','email=ilike.'+encodeURIComponent(clean)+'&select=id');
      if(ex.length){showErr(err,'Email already registered.');}
      else{
        const d=await dbPost('admin_accounts',{name:name.trim(),email:clean,phone:phone.trim(),password:pw.trim(),role:role});
        A.admin=d[0];localStorage.setItem('gd_admin',JSON.stringify(d[0]));A.screen='app';render();toast('Welcome, '+d[0].name+(isOwner()?' (Owner)':' (Support)')+'!');return;
      }
    }catch(e){showErr(err,'Error: '+e.message);}
    if(btn){btn.textContent='Create Admin Account';btn.disabled=false;}
  }
}

function showErr(el,msg){if(el){el.textContent=msg;el.style.display='block';}}

function secOverview(){
  const o=A.orders, u=A.users, p=A.products;
  const now = new Date();
  const today = d => new Date(d).toDateString()===now.toDateString();
  const thisWeek = d => (now-new Date(d)) < 7*86400000;
  const thisMonth = d => new Date(d).getMonth()===now.getMonth() && new Date(d).getFullYear()===now.getFullYear();

  const rev = o.filter(x=>x.status==='delivered').reduce((s,x)=>s+x.total,0);
  const revToday = o.filter(x=>x.status==='delivered'&&today(x.created_at)).reduce((s,x)=>s+x.total,0);
  const revWeek = o.filter(x=>x.status==='delivered'&&thisWeek(x.created_at)).reduce((s,x)=>s+x.total,0);
  const pend = o.filter(x=>x.status==='payment-pending-approval').length;
  const unreadMsgs = (A.messages||[]).filter(x=>!x.admin_reply).length;
  const newUsersToday = u.filter(x=>today(x.created_at)).length;
  const newUsersWeek = u.filter(x=>thisWeek(x.created_at)).length;
  const ordToday = o.filter(x=>today(x.created_at)).length;
  const ordWeek = o.filter(x=>thisWeek(x.created_at)).length;
  const delivered = o.filter(x=>x.status==='delivered').length;
  const conversion = u.length ? ((new Set(o.map(x=>x.user_email)).size/u.length)*100).toFixed(1) : 0;
  const avgOrder = o.length ? Math.round(o.reduce((s,x)=>s+x.total,0)/o.length) : 0;

  // Top products
  const prodCount={};
  o.forEach(or=>(or.items||[]).forEach(i=>{prodCount[i.name]=(prodCount[i.name]||0)+i.qty;}));
  const topProds = Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Last 7 days orders chart
  const days7=[];
  for(let i=6;i>=0;i--){
    const d=new Date(now-i*86400000);
    days7.push({
      label:d.toLocaleDateString('en',{weekday:'short'}),
      orders:o.filter(x=>new Date(x.created_at).toDateString()===d.toDateString()).length,
      rev:o.filter(x=>x.status==='delivered'&&new Date(x.created_at).toDateString()===d.toDateString()).reduce((s,x)=>s+x.total,0)
    });
  }
  const maxOrd=Math.max(...days7.map(d=>d.orders),1);

  let h='<div class="adm-ov">';

  // Title
  h+='<div class="adm-ov-title"><div style="font-family:\'Syne\',sans-serif;color:var(--text);font-size:20px;font-weight:900">Dashboard Overview</div><div style="color:var(--muted);font-size:12px;margin-top:2px">Live data — refreshes every 9 seconds</div></div>';

  // Alert banners
  if(pend>0) h+=`<div class="alert alert-y" style="margin-bottom:14px"><strong>${pend} order${pend>1?'s':''}</strong> awaiting payment verification. <button class="btn btn-yellow btn-sm" onclick="setSection('orders')" style="margin-left:8px">Review</button></div>`;
  if(unreadMsgs>0) h+=`<div class="alert alert-b" style="margin-bottom:14px"><strong>${unreadMsgs} message${unreadMsgs>1?'s':''}</strong> waiting for reply. <button class="btn btn-outline btn-sm" onclick="setSection('messages')" style="margin-left:8px">Reply</button></div>`;
  const needDelivery=o.filter(x=>x.status==='payment-approved'&&!x.delivery_details).length;
  if(needDelivery>0) h+=`<div class="alert alert-g" style="margin-bottom:14px"><strong>${needDelivery} Paystack order${needDelivery>1?'s':''}</strong> confirmed and awaiting delivery. <button class="btn btn-green btn-sm" onclick="setSection('orders')" style="margin-left:8px">Deliver</button></div>`;

  // KPI grid
  h+='<div class="adm-kpi-grid">';
  const kpis=[

  h+='</div>';

  h+='</div></div>';

  h+='</div>';
  return h;
}

function secUsers(){
  const q=(A.search.users||'').toLowerCase();
  const filt=A.users.filter(u=>!q||u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q));
  const verified=A.users.filter(u=>u.verified).length;
  const banned=A.users.filter(u=>u.banned).length;
  const withOrders=new Set(A.orders.map(o=>o.user_email)).size;

  let h='<div>';
  h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <div>
      <div style="font-family:'Syne',sans-serif;color:var(--text);font-size:20px;font-weight:900">User Management</div>
      <div style="color:var(--muted);font-size:12px;margin-top:2px">${A.users.length} registered · ${verified} verified · ${withOrders} ordered · ${banned} banned</div>
    </div>
    <input id="usr-search" placeholder="Search by name or email…" value="${esc(A.search.users)}" style="width:240px;max-width:100%"/>
  </div>`;

  // Quick stats
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px">
    ${[
      ['Total Users',  A.users.length,  'var(--blue)'],
      ['Verified',     verified,         'var(--green)'],
      ['Ordered',      withOrders,       'var(--purple)'],
      ['Banned',       banned,           'var(--red)']
    ].map(([l,v,c])=>`<div class="stcard"><div class="stlabel">${l}</div><div class="stval" style="color:${c}">${v}</div></div>`).join('')}
  </div>`;

  if(!filt.length){
    h+='<div class="card" style="text-align:center;color:var(--muted);padding:40px">No users found.</div>';
  } else {
    filt.forEach(u=>{
      const uo=A.orders.filter(o=>o.user_email===u.email);
      const spent=uo.filter(o=>o.status==='delivered').reduce((s,o)=>s+o.total,0);
      const susp=u.suspended_until&&new Date(u.suspended_until)>new Date();
      const isBanned=!!u.banned;
      h+=`<div class="drow" style="margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div style="width:38px;height:38px;background:var(--grad);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0;opacity:${isBanned?'.4':'1'}">${u.name.charAt(0).toUpperCase()}</div>
          <div style="flex:1;min-width:130px">
            <div style="color:var(--text);font-weight:700;font-size:13px">${esc(u.name)}</div>
            <div style="color:var(--muted);font-size:11px">${esc(u.email)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="color:var(--muted);font-size:11px">${uo.length} orders</span>
            <span style="color:var(--green);font-size:11px;font-weight:700">${fmt(spent)}</span>
            ${u.verified?'<span class="bdg bdg-g">Verified</span>':'<span class="bdg bdg-y">Unverified</span>'}
            ${isBanned?'<span class="bdg bdg-r">Banned</span>':''}
            ${susp?'<span class="bdg bdg-y">Suspended</span>':''}
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <button class="btn btn-ghost btn-sm" onclick="viewUser('${u.id}')">View</button>
            <button class="btn btn-red btn-sm" onclick="doDeleteUser('${u.id}')">Delete</button>
          </div>
        </div>
      </div>`;
    });
  }
  h+='</div>';
  return h;
}

function secAppeals(){
  const appeals=A.appeals||[], pending=appeals.filter(x=>x.status==='pending'), done=appeals.filter(x=>x.status!=='pending');
  return `<div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:8px">
      <div><div style="font-family:'Syne',sans-serif;color:var(--text);font-size:clamp(16px,3vw,20px);font-weight:800">User Appeals</div><div style="color:var(--muted);font-size:12px">${appeals.length} total · ${pending.length} pending</div></div>
      <button class="btn btn-ghost btn-sm" onclick="reload()">Refresh</button>
    </div>
    ${appeals.length===0?`<div class="card" style="text-align:center;padding:50px 20px"><div style="display:flex;justify-content:center;margin-bottom:12px"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div style="color:var(--muted)">No appeals yet.</div></div>`:''}
    ${pending.length?`<div style="color:var(--text);font-weight:700;font-size:12px;margin-bottom:10px">Pending Review (${pending.length})</div>${pending.map(ap=>appealRow(ap)).join('')}`:''}
    ${done.length?`<div style="color:var(--muted);font-weight:700;font-size:11px;margin:18px 0 10px;text-transform:uppercase;letter-spacing:.5px">Resolved (${done.length})</div>${done.slice(0,10).map(ap=>appealRow(ap)).join('')}`:''}
  </div>`;
}

function appealRow(ap){
  const u=A.users.find(x=>x.id===ap.user_id);
  const isBanned=u&&u.banned, isSusp=u&&u.suspended_until&&new Date(u.suspended_until)>new Date();
  const isPend=ap.status==='pending';
  const date=ap.submitted_at?new Date(ap.submitted_at).toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric'}):'';
  return `<div class="drow" style="${isPend?'border-color:rgba(245,158,11,.35)':''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:8px">
      <div><div style="color:var(--text);font-weight:700;font-size:13px">${esc(ap.user_name||'Unknown')}</div><div style="color:var(--muted);font-size:11px">${esc(ap.user_email||'')} · ${date}</div>
        <div style="display:flex;gap:4px;margin-top:5px;flex-wrap:wrap">${isPend?'<span class="bdg bdg-y">Pending</span>':'<span class="bdg bdg-g">Resolved</span>'}${isBanned?'<span class="bdg bdg-r">User Banned</span>':''}${isSusp?'<span class="bdg bdg-y">User Suspended</span>':''}</div>
      </div>
    </div>
    <div style="background:var(--bg3);border-radius:8px;padding:10px;margin-bottom:10px"><div style="color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:5px">Message</div><div style="color:var(--text);font-size:12px;line-height:1.6">${esc(ap.message||'')}</div></div>
    ${isPend?`<div style="display:flex;gap:7px;flex-wrap:wrap">
      ${ap.user_id?`<button class="btn btn-ghost btn-sm" onclick="viewUser('${ap.user_id}')">View User</button>`:''}
      ${isBanned&&ap.user_id?`<button class="btn btn-green btn-sm" onclick="unbanViaAppeal('${ap.user_id}','${ap.id||ap.submitted_at}')">Unban User</button>`:''}
      ${isSusp&&ap.user_id?`<button class="btn btn-green btn-sm" onclick="unsuspendViaAppeal('${ap.user_id}','${ap.id||ap.submitted_at}')">Lift Suspension</button>`:''}
      <button class="btn btn-ghost btn-sm" onclick="resolveAppeal('${ap.id||ap.submitted_at}')">Mark Resolved</button>
    </div>`:''}
  </div>`;
}

const FSIM_BASE = 'https://5sim.net/v1';

async function fsimFetch(url, method='GET'){
  const headers = {
    'Authorization': 'Bearer '+FIVESIM_KEY,
    'Accept': 'application/json'
  };

  // Strategy 1: Direct request
  try {
    const r = await fetch(url, {method, headers, mode:'cors'});
    if(r.ok) return await r.json();
  } catch(e){}

  // Strategy 2: corsproxy.io
  try {
    const proxy = 'https://corsproxy.io/?'+encodeURIComponent(url);
    const r = await fetch(proxy, {method, headers});
    if(r.ok){
      const txt = await r.text();
      if(txt && (txt.trim()[0]==='{' || txt.trim()[0]==='[')) return JSON.parse(txt);
    }
  } catch(e){}

  // Strategy 3: allorigins raw (GET only)
  if(method==='GET'){
    try {
      const proxy = 'https://api.allorigins.win/raw?url='+encodeURIComponent(url);
      const r = await fetch(proxy);
      if(r.ok){
        const txt = await r.text();
        if(txt && (txt.trim()[0]==='{' || txt.trim()[0]==='[')) return JSON.parse(txt);
      }
    } catch(e){}
  }

  // Strategy 4: thingproxy
  try {
    const proxy = 'https://thingproxy.freeboard.io/fetch/'+url;
    const r = await fetch(proxy, {method, headers});
    if(r.ok) return await r.json();
  } catch(e){}

  throw new Error('Cannot reach 5SIM API. This is a browser security (CORS) restriction. Please open your admin panel directly from globaldigits.shop — not from a local file. If already on the live site, try refreshing.');
}

async function fsimGet(path){ return fsimFetch(FSIM_BASE+path, 'GET'); }
async function fsimPost(path){ return fsimFetch(FSIM_BASE+path, 'POST'); }

async function checkNumbers(){
  const countryEl = document.getElementById('fsim-country');
  const productEl = document.getElementById('fsim-product');
  if(!countryEl||!productEl) return;
  const country = countryEl.value;
  const product = productEl.value;
  const res = document.getElementById('fsim-check-result');
  if(res) res.innerHTML = '<div style="color:var(--muted);font-size:12px">Checking availability...</div>';
  try {
    // Use guest endpoint (no auth needed for prices)
    const d = await fsimGet('/guest/products/'+country+'/any');
    if(!d || typeof d !== 'object'){
      if(res) res.innerHTML = '<div class="alert alert-y">No data returned. Try a different country.</div>';
      return;
    }
    // Find the product — try exact match then partial match
    let prod = d[product];
    if(!prod){
      // Try to find a matching key
      const key = Object.keys(d).find(k=>k.toLowerCase().includes(product.toLowerCase()));
      if(key) prod = d[key];
    }
    if(!prod){
      if(res) res.innerHTML =
        '<div class="alert alert-y">'+product+' not available in '+country+'.<br>' +
        '<div style="margin-top:8px;font-size:11px">Available services: '+Object.keys(d).slice(0,10).join(', ')+'</div></div>';
      return;
    }
    const qty = prod.Qty || prod.qty || 0;
    const price = parseFloat(prod.Price || prod.price || 0).toFixed(2);
    if(qty === 0){
      if(res) res.innerHTML = '<div class="alert alert-y">Out of stock for '+product+' in '+country+'. Try another country or platform.</div>';
      return;
    }
    if(res) res.innerHTML =
      '<div class="alert alert-g" style="margin-bottom:12px">' +
        '<div style="font-size:15px;font-weight:800;margin-bottom:4px">✓ '+qty+' numbers available</div>' +
        '<div>Price: <strong>$'+price+'</strong> per number</div>' +
        '<div style="font-size:11px;margin-top:3px;opacity:.8">Country: '+country+' · Platform: '+product+'</div>' +
      '</div>' +
      '<button class="btn btn-primary" onclick="buyNumber(\''+country+'\',\''+product+'\')">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>' +
        ' Buy Number Now ($'+price+')' +
      '</button>';
  } catch(e) {
    if(res) res.innerHTML =
      '<div class="alert alert-r">'+e.message+'</div>' +
      '<div style="margin-top:8px"><a href="https://5sim.net/v1/guest/products/'+country+'/any" target="_blank" class="btn btn-ghost btn-sm">View Raw API Data</a></div>';
  }
}

async function buyNumber(country, product){
  const res = document.getElementById('fsim-check-result');
  if(res) res.innerHTML = '<div style="color:var(--muted);font-size:12px">Purchasing number...</div>';
  try {
    const d = await fsimPost('/user/buy/activation/'+country+'/any/'+product);
    if(!d.phone) throw new Error('No phone returned: '+JSON.stringify(d));
    toast('Number purchased: '+d.phone);
    // Store active number in memory
    if(!A.activeNumbers) A.activeNumbers = [];
    A.activeNumbers.unshift({id:d.id, phone:d.phone, product:product, country:country, status:d.status, sms:[], bought:new Date().toISOString()});
    if(res) res.innerHTML = `
      <div class="alert alert-g">
        <strong>Number purchased!</strong><br>
        Phone: <span style="font-family:monospace;font-size:14px;font-weight:800">${d.phone}</span><br>

      </div>`;
    loadActiveNumbers();
  } catch(e) {
    if(res) res.innerHTML = '<div class="alert alert-r">Purchase failed: '+e.message+'</div>';
  }
}

      </div>`:'<div style="color:var(--muted);font-size:12px;margin-top:8px">Waiting for SMS...</div>'}

function secAnalytics(){
  if(!isOwner()){
    return '<div class="card" style="text-align:center;padding:50px"><div style="color:var(--text);font-weight:700;margin-bottom:6px">Owner Access Only</div></div>';
  }

  // Build analytics from user data and orders
  const now = new Date();
  const last7 = new Date(now - 7*86400000);
  const last30 = new Date(now - 30*86400000);

  // Users registered over time
  const newToday = A.users.filter(u=>new Date(u.created_at).toDateString()===now.toDateString()).length;
  const newWeek = A.users.filter(u=>new Date(u.created_at)>=last7).length;
  const newMonth = A.users.filter(u=>new Date(u.created_at)>=last30).length;

  // Orders over time
  const ordToday = A.orders.filter(o=>new Date(o.created_at).toDateString()===now.toDateString()).length;
  const ordWeek = A.orders.filter(o=>new Date(o.created_at)>=last7).length;
  const ordMonth = A.orders.filter(o=>new Date(o.created_at)>=last30).length;

  // Revenue
  const revToday = A.orders.filter(o=>o.status==='delivered'&&new Date(o.created_at).toDateString()===now.toDateString()).reduce((s,o)=>s+o.total,0);
  const revWeek = A.orders.filter(o=>o.status==='delivered'&&new Date(o.created_at)>=last7).reduce((s,o)=>s+o.total,0);
  const revMonth = A.orders.filter(o=>o.status==='delivered'&&new Date(o.created_at)>=last30).reduce((s,o)=>s+o.total,0);

  // Top products
  const prodCount = {};
  A.orders.forEach(o=>(o.items||[]).forEach(i=>{prodCount[i.name]=(prodCount[i.name]||0)+i.qty;}));
  const topProds = Object.entries(prodCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // User activity - what pages/actions users do (from order data)
  const statusBreakdown = {};
  A.orders.forEach(o=>{statusBreakdown[o.status]=(statusBreakdown[o.status]||0)+1;});

  // Recent registrations
  const recentUsers = [...A.users].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,10);

  // Devices/countries from user agents (not available server-side, show order patterns instead)
  // Day-by-day orders last 7 days
  const days7 = [];
  for(let i=6;i>=0;i--){
    const d = new Date(now - i*86400000);
    const dstr = d.toLocaleDateString('en-NG',{weekday:'short',day:'numeric',month:'short'});
    const cnt = A.orders.filter(o=>new Date(o.created_at).toDateString()===d.toDateString()).length;
    const rev = A.orders.filter(o=>o.status==='delivered'&&new Date(o.created_at).toDateString()===d.toDateString()).reduce((s,o)=>s+o.total,0);
    days7.push({label:dstr,orders:cnt,rev});
  }
  const maxOrds = Math.max(...days7.map(d=>d.orders),1);

  return `<div>

    <div style="color:var(--muted);font-size:12px;margin-bottom:20px">Site activity, user behaviour and performance metrics</div>

async function sendNotification(){
  const title=(document.getElementById('notif-title')||{}).value||'';
  const msg=(document.getElementById('notif-msg')||{}).value||'';
  const color=(document.getElementById('notif-color')||{}).value||'info';
  const link=(document.getElementById('notif-link')||{}).value||'';
  const res=document.getElementById('notif-result');
  if(!title.trim()||!msg.trim()){toast('Enter title and message','w');return;}
  const btn=document.querySelector('[onclick="sendNotification()"]');
  if(btn){btn.textContent='Sending...';btn.disabled=true;}
  if(res)res.innerHTML='<div style="color:var(--muted);font-size:12px">Publishing...</div>';
  var errors=[], pushCount=0;

  // Step 1: Create in-app announcement banner
  try{
    await dbPost('announcements',{title:title.trim(),message:msg.trim(),color:color,active:true,created_at:new Date().toISOString()});
  }catch(e){errors.push('Announcement: '+e.message);}

  // Step 2: Fetch push subscriptions and queue push
  try{
    var subs=await dbGet('push_subscriptions','select=user_id,user_email&limit=2000');
    if(subs.length){
      pushCount=subs.length;
      var qr={title:title.trim(),message:msg.trim(),link:link.trim()||null,color:color,
              subscriber_count:subs.length,status:'pending',
              created_at:new Date().toISOString()};
      try{await dbPost('push_queue',qr);}catch(e){console.warn('push_queue:',e.message);}
    }
  }catch(e){errors.push('Push: '+e.message);}

  await reload();
  var ok='Announcement published!';
  if(pushCount>0)ok+=' Push queued for '+pushCount+' device'+(pushCount>1?'s':'')+'.';
  if(errors.length){
    if(res)res.innerHTML='<div class="alert alert-y">Done with warnings: '+errors.join(', ')+'</div>';
  } else {
    if(res)res.innerHTML='<div class="alert alert-g">'+ok+'</div>';
  }
  toast(ok);
  if(document.getElementById('notif-title'))document.getElementById('notif-title').value='';
  if(document.getElementById('notif-msg'))document.getElementById('notif-msg').value='';
  if(btn){btn.textContent='Publish Announcement';btn.disabled=false;}
}

function showModal(html, large){
  const ex=document.getElementById('modal-overlay'); if(ex) ex.remove();
  const ov=document.createElement('div');
  ov.className='moverlay'; ov.id='modal-overlay';
  ov.innerHTML=`<div class="mbox${large?' mbox-lg':''}">${html}</div>`;
  ov.onclick=e=>{if(e.target===ov)closeModal();};
  document.body.appendChild(ov);
}
function closeModal(){const e=document.getElementById('modal-overlay');if(e)e.remove();}

async function resolveAppeal(appealId, silent){
  try{
    try{await dbPatch('appeals','id=eq.'+appealId,{status:'resolved'});}

      if(s[0]){const list=(s[0].value||[]).map(a=>(a.id===appealId||a.submitted_at===appealId)?{...a,status:'resolved'}:a);await dbPatch('settings','key=eq.appeals',{value:list});}

  }catch(e){if(!silent)toast('Error: '+e.message,'e');}
}

  const cur=(document.getElementById('s-cpw')||{}).value||'', nw=(document.getElementById('s-npw')||{}).value||'', cf=(document.getElementById('s-cpw2')||{}).value||'';
  if(!cur||!nw){toast('Fill all password fields','w');return;}
  if(nw!==cf){toast('Passwords do not match','e');return;}
  if(nw.length<6){toast('Password too short','e');return;}
  try{
    const d=await dbGet('admin_accounts','id=eq.'+A.admin.id);
    if(!d[0]||d[0].password!==cur){toast('Current password incorrect','e');return;}
    await dbPatch('admin_accounts','id=eq.'+A.admin.id,{password:nw});
    A.admin.password=nw; localStorage.setItem('gd_admin',JSON.stringify(A.admin));
    toast('Password changed!');
    document.getElementById('s-cpw').value=''; document.getElementById('s-npw').value=''; document.getElementById('s-cpw2').value='';
  }catch(e){toast('Error: '+e.message,'e');}
}

// ══════════════════════════════════════════
// ACTIVITY LOG
// ══════════════════════════════════════════
function secActivity(){
  const recent=[...A.orders].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,25);
  return `<div>
    <div style="font-family:'Syne',sans-serif;color:var(--text);font-size:clamp(16px,3vw,20px);font-weight:800;margin-bottom:18px">Activity Log</div>
    <div class="card">${recent.map(o=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="flex-shrink:0">
          ${o.status==='delivered'
            ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>'
            :o.status==='cancelled'
            ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
            :'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'}
        </div>
        <div style="flex:1;min-width:0"><div style="color:var(--text);font-size:12px;font-weight:600">${esc(o.user_name)} placed order</div><div style="color:var(--muted);font-size:11px;font-family:monospace">${o.id} · ${fmt(o.total)}</div></div>
        <div style="text-align:right;flex-shrink:0">${sBadge(o.status)}<div style="color:var(--muted);font-size:10px;margin-top:3px">${ago(o.created_at)}</div></div>
      </div>`).join('')}
    </div>
  </div>`;
}

// ══════════════════════════════════════════
// BIND SECTION EVENTS
// ══════════════════════════════════════════
function bindSection(){
  const os=document.getElementById('ord-search'); if(os) os.oninput=e=>{A.search.orders=e.target.value;renderSection();};
  var bsch=document.getElementById('boost-search'); if(bsch) bsch.oninput=function(e){A.search.boosts=e.target.value;renderSection();};
  document.querySelectorAll('[data-boostf]').forEach(function(b){b.onclick=function(){A.filter.boosts=this.dataset.boostf;renderSection();};});
  const ps=document.getElementById('prod-search'); if(ps) ps.oninput=e=>{A.search.products=e.target.value;renderSection();};
  document.querySelectorAll('[data-catf]').forEach(function(b){ b.onclick=function(){setFilter('products',this.dataset.catf);}; });
  const us=document.getElementById('usr-search'); if(us) us.oninput=e=>{A.search.users=e.target.value;renderSection();};
  if(A.section==='settings') loadSettingsForm();

  var rs2=document.getElementById('redeem-search'); if(rs2) rs2.oninput=function(e){A.search.redeem=e.target.value;renderSection();};
  document.querySelectorAll('[data-redeemf]').forEach(function(btn){btn.onclick=function(){setFilter('redeem',this.dataset.redeemf);renderSection();};});
}
function setFilter(type,val){A.filter[type]=val;renderSection();}


// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function genId() {
  return 'GD-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substr(2,4).toUpperCase();
}

function showErr(el, msg) {
  if(el){ el.textContent = msg; el.style.display = 'block'; }
}

function startClock() {
  var el = document.getElementById('tb-clock');
  if(!el) return;
  function tick(){
    var d = new Date();
    el.textContent = d.toLocaleTimeString('en-NG',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  tick();
  setInterval(tick, 1000);
}

// ══════════════════════════════════════════
// BOOT — DOMContentLoaded
// ══════════════════════════════════════════
(function boot() {
  function start() {
    render();
  }
  if(document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
